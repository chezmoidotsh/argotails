---
name: 🤖 Issue/PR Automation
on:
  pull_request:
  issues:
    types: [opened]

permissions: {}

jobs:
  labeler:
    name: 🏷️ Labeler
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - name: 🏷️ Apply label on PR
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
