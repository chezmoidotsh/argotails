---
name: 🤖 Issue/PR Automation
on:
  pull_request:
  issues:
    types: [opened]

permissions: {}

jobs:
  labeler:
    name: 🏷️ Labeler
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - name: 🏷️ Apply label on PR
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
